name: fauji_fitness
description: "Fauji Fitness App."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  fl_chart: ^1.2.0
  intl: ^0.18.1
  http: ^1.1.0
  image_picker: ^1.1.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Firebase dependencies
  firebase_core: ^2.27.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.0
  google_sign_in: ^6.2.1

  # New architecture dependencies
  flutter_riverpod: ^2.6.1
  go_router: ^7.1.1
  flutter_screenutil: ^5.8.4
  pedometer: ^4.2.0
  permission_handler: ^12.0.1


  # 🔥 ADDED: Device Info Plus ka latest version taake build crash fix ho
  # In dono ko naye versions se replace kar dein
  health: ^13.3.1
  device_info_plus: ^12.1.0

  # 🔥 FIXED STABLE VERSION (No more shim errors)
  workmanager:  ^0.9.0
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 24

flutter_native_splash:
  color: "#0B0D0A"
  image: "assets/images/app_icon.png"
  android_12:
    image: "assets/images/app_icon.png"
    color: "#0B0D0A"